.link-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-decoration:none;color:var(--txt);transition:var(--transition);margin-bottom:12px}.link-card:hover{border-color:var(--accent);background:var(--surface-alt);transform:translateY(-1px);box-shadow:0 4px 8px rgba(0,0,0,0.04)}.link-card .l-icon{font-size:24px;flex-shrink:0;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--accent-lt);border-radius:var(--radius-sm)}.link-card .l-info{flex:1;min-width:0}.link-card .l-info h4{font-size:14px;font-weight:700;margin:0 0 2px;color:var(--txt)}.link-card .l-info p{font-size:13px;line-height:1.5;color:var(--txt2);margin:0}.link-card::after{content:"↗";font-size:14px;color:var(--txt3);flex-shrink:0;margin-left:4px}

<script>
const D={title:"자연사박물관 전시 증가 예측",pages:[
{id:"p1",cat:"도입",icon:"🎯",title:"학습목표",blocks:[
{t:"html",v:`<div class="blk" style="text-align:center;padding:20px 0"><div style="font-size:12px;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:6px">수학 × 정보 융합 · 전시 데이터 예측</div><h2 style="font-size:28px;font-weight:900;margin-bottom:8px">자연사박물관 전시 증가 예측</h2><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:15px"><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--accent-lt);color:var(--accent-dk)">수학(미분·변화율)</span><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--blue-lt);color:var(--blue)">정보(회귀분석)</span><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--purple-lt);color:var(--purple)">AI 예측 모델</span></div></div>`},
{t:"objectives",items:["자연사박물관 전시 건수 데이터를 수집·분석하여, 증가 추세를 수학적 모델로 표현할 수 있다.","미분 개념을 활용하여 증가율을 해석하고, 미래 전시 수를 예측하는 문제를 해결할 수 있다.","데이터 분석 과정에 인공지능(AI) 및 디지털 도구를 적절히 활용하여, 실생활 문제 해결 능력을 기를 수 있다."]}
]},
{id:"p2",cat:"도입",icon:"💭",title:"생각해요",blocks:[
{t:"html",v:`<div class="blk"><h3>이러한 전시 증가를 수학적으로 예측할 수 있을까?</h3><p>최근 다양한 자연사박물관에서는 디지털 기술의 발전과 함께 전시 수가 빠르게 증가하고 있다. 이러한 변화는 단순한 전시 수의 확대가 아니라, 과학 대중화와 교육적 가치 확산의 지표이다.</p></div>`},
{t:"input",label:"▶ 자연사박물관 전시의 수가 왜 증가하고 있을까?",ph:"예: 디지털 기술의 발전, 과학 교육에 대한 관심 증가, 체험형 전시 확대 등",rows:2},
{t:"input",label:"▶ 전시 수의 증가를 수학적으로 표현하려면 어떤 방법이 필요할까?",ph:"예: 시간에 따른 전시 수를 함수로 나타내고, 변화율을 분석한다.",rows:2},
{t:"input",label:"▶ 만약 전시 수가 계속 같은 비율로 증가한다면, 10년 후 전시 수는 어떻게 될까?",ph:"예: 지수적으로 증가하여 현재의 2배 이상이 될 수 있다.",rows:2}
]},
{id:"p3",cat:"알아봐요",icon:"📖",title:"1. 함수와 데이터의 관계",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 함수와 데이터의 관계</h3><p>자연사박물관 전시 수가 매년 변화하는 모습을 수학적으로 표현하려면, 시간(연도)을 x축, 전시 건수를 y축으로 하여 함수 그래프로 나타낼 수 있다.</p><p>이때 함수의 형태(선형, 다항, 지수 등)는 데이터의 패턴을 보여주는 중요한 단서가 된다. 즉, 전시 수가 꾸준히 증가하면 '선형함수', 빠르게 증가하면 '지수함수'로 표현할 수 있다.</p></div>`},
{t:"callout",variant:"blue",title:"▷ 활용 포인트",body:"① 실제 전시 건수 데이터를 함수로 나타내며, 데이터의 흐름을 수학적으로 모델링할 수 있음<br>② GeoGebra를 활용하여 함수 형태를 시각화하고, 연도별 증가 추세를 직관적으로 탐색할 수 있음<br>③ 다양한 함수 모델(선형, 다항, 지수)을 비교하여 가장 적합한 형태를 찾는 과정을 경험함"},
{t:"link",url:"https://www.museum.go.kr/site/main/statistics",icon:"🏛️",title:"국립중앙박물관 통계포털",desc:"연도별 전시 건수 데이터를 탐색할 수 있습니다"},
{t:"link",url:"https://www.geogebra.org",icon:"📐",title:"GeoGebra 공식 사이트",desc:"함수 그래프를 시각화하고 데이터를 탐색할 수 있습니다"},
{t:"cards",items:[
{front:"Google Colab",back:"Python으로 전시 건수 데이터를 불러오고, 회귀(예측) 모델을 구현하여 그래프로 시각화"},
{front:"GeoGebra",back:"데이터 추세를 함수로 표현하고, 그래프 형태/기울기(변화율)를 탐색하며 수학 개념을 직관적으로 이해"},
{front:"ChatGPT",back:"분석 절차 설계 도움, Colab 코드 초안/오류 수정, 보고서 문장 다듬기에 활용"},
{front:"Excel",back:"원자료 정리 및 결측·형식 통일, 기본 통계량 산출 및 사전 점검 관련 차트 제작"}
]}
]},
{id:"p4",cat:"알아봐요",icon:"📖",title:"2. 증가율과 미분, 데이터 예측",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 증가율과 미분의 개념</h3><p>함수의 기울기(미분)는 변화율을 나타내는 수학적 도구로, 자연사박물관 전시 수가 얼마나 빠르게 증가하고 있는가를 분석하는 데 활용된다.</p><p>예를 들어, 전시 건수가 1년에 50건씩 증가한다면, 그 구간의 변화율(기울기)은 일정하며 기울기가 커질수록 증가 속도가 빨라졌음을 의미한다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>▶ 데이터 예측과 회귀 분석</h3><p>수집한 전시 데이터를 바탕으로 미래의 전시 수를 예측하는 과정은 데이터 과학에서 사용하는 회귀 분석(Regression Analysis)과 밀접하게 관련된다. 과거의 데이터에 가장 잘 맞는 함수(직선 또는 곡선)를 찾고, 그 함수식을 이용해 미래 값을 예측할 수 있다.</p></div>`},
{t:"callout",variant:"purple",title:"🏛️ 자연사박물관 전시는 어떻게 예측할 수 있을까?",body:"전시 수는 단순히 해마다 변하는 것이 아니라 연구 성과, 사회적 관심, 관람객 요구 등 여러 요인의 영향을 받는다. 따라서 전시 기획에 작용하는 요소를 파악하는 것이 중요하다.<br><br>전시 예측은 단순한 숫자 변화가 아니라 사회적 흐름과 관람객 요구를 반영한 기획 과정이다. 다양한 정보를 종합해서 전시의 흐름을 살피면 향후 전시 방향을 보다 정확하게 전망할 수 있다."}
]},
{id:"p5",cat:"활동해요",icon:"✏️",title:"1. 전시 데이터 수집 및 함수 그래프 표현",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 전시 데이터 수집 및 함수 그래프 표현</h3></div>`},
{t:"steps",title:"활동 순서",items:[
{title:"1. 데이터 탐색",desc:"국립중앙박물관·KOSIS에서 연도별 전시 건수 데이터를 탐색한다."},
{title:"2. 데이터 입력",desc:"수집한 데이터를 GeoGebra(혹은 Excel)에 입력한다."},
{title:"3. 그래프 생성",desc:"그래프를 생성하고 패턴을 분석한다."},
{title:"4. 모델 토의",desc:"선형, 지수, 다항함수 중 어떤 형태가 적합한지 조별로 토의한다."}
]},
{t:"input",label:"1. 국립중앙박물관(혹은 KOSIS)에서 제공하는 연도별 전시 건수 데이터를 탐색해 보자.",ph:"탐색한 데이터의 범위와 출처를 기록하세요.",rows:2},
{t:"input",label:"2. 수집한 데이터를 GeoGebra(혹은 Excel)에 입력하여 함수의 그래프 형태로 표현해 보자.",ph:"사용한 도구와 그래프 형태를 기록하세요.",rows:2},
{t:"input",label:"3. 그래프를 관찰하며 전시 수의 증가 패턴(선형, 지수 등)을 찾아보고 이유를 함께 이야기해 보자.",ph:"예: 선형에 가깝다. 매년 일정한 수의 전시가 추가되는 것으로 보인다.",rows:3}
]},
{id:"p6",cat:"활동해요",icon:"💻",title:"2. Colab을 활용한 전시 예측 모델 만들기",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ Colab 기반 전시 예측 모델 만들기</h3></div>`},
{t:"steps",title:"활동 순서",items:[
{title:"1. 데이터 불러오기",desc:"Python으로 전시 건수 데이터를 불러온다."},
{title:"2. 회귀 모델 구현",desc:"선형 회귀 모델을 구현한다."},
{title:"3. 예측 시각화",desc:"예측 그래프를 시각화한다."},
{title:"4. 오차 분석",desc:"실제 데이터와 비교 후 오차 원인을 분석한다."}
]},
{t:"input",label:"1. Google Colab에서 Python을 이용하여 데이터를 불러오고, 선형 회귀모델을 작성해 보자.",ph:"사용한 코드와 결과를 기록하세요.",rows:3},
{t:"input",label:"2. 모델을 통해 미래 전시 수를 예측하고, 그래프로 시각화해 보자.",ph:"예측된 값과 그래프의 특징을 기록하세요.",rows:3},
{t:"input",label:"3. 실제 데이터와 비교하여 예측 오차의 원인을 찾아보고, 개선 방법을 제시해 보자.",ph:"예: 이상치(Outlier)가 있어 오차가 크다. 코로나 기간의 데이터를 제외하면 정확도가 높아질 것이다.",rows:3}
]},
{id:"p7",cat:"활동해요",icon:"💡",title:"3. 팀 기반 분석 결과 도출",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 팀 기반 분석 결과 도출하여 결과 정리하기</h3></div>`},
{t:"input",label:"전시 수는 어떤 패턴으로 증가하는가?",ph:"예: 전체적으로 선형 증가하지만, 특정 시기에 급증하는 구간이 있다.",rows:2},
{t:"input",label:"미분값이 가장 높은 구간은 언제인가?",ph:"예: 2015~2018년 구간에서 기울기가 가장 가팔랐다.",rows:2},
{t:"input",label:"10년 후의 예측치는 얼마인가?",ph:"예: 선형 모델 기준 약 XX건, 지수 모델 기준 약 XX건으로 예측된다.",rows:2},
{t:"input",label:"사회·문화적 의미는 무엇인가?",ph:"예: 전시 수 증가는 과학 교육의 대중화와 문화 접근성 확대를 의미한다.",rows:3}
]},

{id:"p9",cat:"정리",icon:"❓",title:"활동퀴즈 1. 함수적 증가 분석",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 함수적 증가 분석</h3></div>`},
{t:"quiz",num:"01",q:"아래 중 전시 수 증가를 함수로 표현했을 때 가장 적절한 설명은?",opts:["전시 수의 변화는 일정하므로 상수함수이다.","전시 수는 시간에 따라 감소하므로 음수함수이다.","전시 수는 시간에 따라 일정 비율로 증가하므로 선형함수이다.","전시 수는 불규칙하게 변화하므로 함수로 표현할 수 없다.","전시 수는 시간에 따라 꾸준히 증가하므로 증가함수이다."],ans:4,ok:"정답입니다! 전시 수는 꾸준히 증가하는 증가함수로 표현할 수 있습니다.",no:"힌트: 전시 수가 매년 늘어나는 경향을 무엇이라 하나요?"},
{t:"quiz",num:"02",q:"전시 증가 추세를 선형 함수로 표현할 때, 기울기의 의미로 옳은 것은?",opts:["전시 건수가 시간에 따라 감소하는 정도","전시 수가 변하지 않는 비율","전시 건수의 초기값","전시 수가 시간에 따라 변하는 비율","전시 수의 최대값"],ans:3,ok:"정답입니다! 기울기는 전시 수가 시간에 따라 변하는 비율을 나타냅니다.",no:"힌트: 직선의 기울기는 '변화율'을 의미합니다."},
{t:"quiz",num:"03",q:"전시 수 증가 그래프의 모양이 직선이 아닌 곡선이라면 어떤 해석이 가능한가?",opts:["일정한 속도로 증가한다.","증가율이 시간이 지나도 변하지 않는다.","전시 수 증가 속도가 점점 커지고 있다.","감소율이 일정하게 유지된다.","변화율이 0이다."],ans:2,ok:"정답입니다! 곡선(위로 볼록한 형태)이면 증가 속도가 점점 빨라지고 있다는 뜻입니다.",no:"힌트: 곡선의 기울기가 점점 가팔라지면 무엇을 의미할까요?"}
]},
{id:"p10",cat:"정리",icon:"❓",title:"활동퀴즈 2. 미분·회귀분석",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 미분과 변화율 / 데이터 예측과 회귀분석</h3></div>`},
{t:"quiz",num:"04",q:"전시 증가 추세에서 미분을 사용하면 알 수 있는 것은?",opts:["전시 수의 누적 합","전시 수의 총합","전시 수의 변화율","전시 수의 평균값","전시 수의 최대값"],ans:2,ok:"정답입니다! 미분은 특정 시점에서의 변화율(증가 속도)을 알려줍니다.",no:"힌트: 미분은 '순간 변화율'을 구하는 도구입니다."},
{t:"quiz",num:"05",q:"전시 수 데이터를 바탕으로 미래 값을 예측하는 데 가장 적절한 분석 방법은?",opts:["데이터 군집화","회귀 분석","분류 모델","결정 트리","군집 중심 탐색"],ans:1,ok:"정답입니다! 회귀 분석은 과거 데이터를 기반으로 미래 값을 예측하는 통계적 방법입니다.",no:"힌트: 과거 데이터에 가장 잘 맞는 함수를 찾아 미래를 예측하는 방법입니다."},
{t:"quiz",num:"06",q:"전시 수 데이터를 예측했을 때 실제 값과 차이가 클 경우, 가장 먼저 점검해야 할 부분은?",opts:["데이터의 수량","학습 알고리즘의 복잡도","이상치(Outlier) 또는 데이터 오류","함수의 차수","시각화 방법"],ans:2,ok:"정답입니다! 이상치나 데이터 오류가 예측 정확도를 크게 떨어뜨릴 수 있습니다.",no:"힌트: 튀는 값(이상치)이 모델을 왜곡할 수 있습니다."}
]},
{id:"p11",cat:"정리",icon:"📚",title:"읽기 자료",blocks:[
{t:"html",v:`<div class="blk"><h3>★ 지수함수와 성장 모델</h3><p>자연사박물관 전시 수는 일정한 간격으로 꾸준히 증가할 때 지수함수로 표현할 수 있다. 지수함수는 시간의 흐름에 따라 변화율이 일정 비율로 커지는 현상을 설명하는 함수이다. 이러한 모델은 단순한 데이터 비교보다 미래의 성장 예측에 강점을 가진다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 인공지능을 활용한 전시 수 예측</h3><p>최근 자연사박물관은 단순한 통계적 회귀분석을 넘어, 인공지능(AI) 기술을 활용한 전시 예측 시스템을 도입하고 있다. 머신러닝 모델을 통해 관람객 수, 계절, 주제별 관심도 데이터를 함께 학습시켜 보다 정밀한 예측 결과를 도출한다. 이를 통해 박물관은 데이터 중심의 지속 가능한 전시 기획을 실현할 수 있다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 과학문화와 데이터 기반 전시 기획</h3><p>최근의 자연사박물관은 단순한 전시 공간을 넘어, 데이터 기반 기획이 중심이 되고 있다. 관람객 수, 연령대, 관심 분야 등의 데이터를 분석하여 맞춤형 전시 콘텐츠를 구성하기 때문이다. 이 과정에서 수학적 예측 모델은 단순한 분석을 넘어, 실제 문화산업의 기획 도구로 활용된다.</p></div>`}
]},
{id:"p12",cat:"정리",icon:"🧭",title:"진로 연계",blocks:[
{t:"html",v:`<div class="blk"><h3>📖 책 소개</h3><p><strong>《데이터 시각화 디자인》</strong>(저자: 나가타 유카리) — 복잡한 데이터를 명확하게 표현하기 위한 그래프 설계 원리와 시각적 스토리텔링 기법을 다루는 책</p><p><strong>《회귀분석 따라하기》</strong>(저자: 신건권) — 회귀분석을 중심으로 실제 데이터 분석에 필수인 기초 이론과 개념을 쉽게 기술한 책</p></div>`},

{front:"문화콘텐츠학과",back:"문화산업 전반의 기획과 콘텐츠 제작을 연구하는 전공"},
{front:"데이터사이언스학과",back:"수학·통계·프로그래밍을 융합하여 데이터를 분석하고 예측하는 전공"}

{t:"html",v:`<div class="blk"><h3>🏢 기업 소개</h3><p><strong>주식회사 그루텍</strong> — 공공데이터 기반 컨설팅 및 데이터 분석을 전문으로 하는 기업. 데이터 분석 및 예측을 위한 데이터 정제·분류·분석 프로세스 설계 역량을 보여주는 역할 모델.</p><p><strong>한국문화정보원</strong> — 문화정보와 유산 데이터를 수집·개방하고, 문화빅데이터 플랫폼을 운영하여 문화 산업 전반의 데이터 활용 생태계를 조성하는 공공기관.</p></div>`}
]}
]};
let cur='p1',visited=new Set();
function rBlock(b,pid){switch(b.t){case 'html':return b.v;case 'objectives':return`<div class="blk blk-card"><h3>🎯 학습목표</h3><ul class="obj-list">${b.items.map((x,i)=>`<li><span class="obj-num">${i+1}</span><span>${x}</span></li>`).join('')}</ul></div>`;case 'callout':return`<div class="callout ${b.variant||''}"><div class="c-title">${b.title}</div><div class="c-body">${b.body}</div></div>`;case 'input':{const id='i-'+Math.random().toString(36).substr(2,5);return`<div class="blk input-group"><label for="${id}">${b.label}</label>${b.rows>1?`<textarea id="${id}" rows="${b.rows}" placeholder="${b.ph||''}"></textarea>`:`<input type="text" id="${id}" placeholder="${b.ph||''}">`}</div>`;}case 'steps':return`<div class="steps"><div class="s-hd">📋 ${b.title}</div>${b.items.map((s,i)=>`<div class="step" onclick="this.classList.toggle('done')"><div class="s-n">${i+1}</div><div class="s-c"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`).join('')}</div>`;case 'link':return`<a class="link-card" href="${b.url}" target="_blank"><div class="l-icon">${b.icon||'🔗'}</div><div class="l-info"><h4>${b.title}</h4><p>${b.desc}</p></div></a>`;case 'tabs':{const tid='t-'+Math.random().toString(36).substr(2,5);return`<div class="blk"><div class="tabs-nav">${b.tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" onclick="swTab('${tid}',${i},this)">${t.label}</button>`).join('')}</div>${b.tabs.map((t,i)=>`<div class="tab-panel ${i===0?'active':''}" id="${tid}-${i}">${t.content}</div>`).join('')}</div>`;}case 'cards':return`<div class="cards-grid">${b.items.map(c=>`<div class="flip-card" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="flip-front">${c.front.replace(/\n/g,'<br>')}</div><div class="flip-back">${c.back}</div></div></div>`).join('')}</div>`;case 'prediction':return`<div class="blk blk-card"><h4>🔮 예측 조건/행동 입력</h4>${b.items.map(x=>`<div class="pred-row"><label>${x.label}</label><input type="text" placeholder="${x.ph}" style="width:100%"></div>`).join('')}<button class="btn btn-p" style="margin-top:10px" onclick="alert('입력값이 저장되었습니다!')">저장하기</button></div>`;case 'quiz':{const qid='q-'+Math.random().toString(36).substr(2,8);return`<div class="blk blk-card" id="${qid}"><div class="quiz-q"><span class="qn">${b.num}.</span><span>${b.q}</span></div>${b.opts.map((o,i)=>`<div class="quiz-opt" onclick="chkQ('${qid}',${i},${b.ans})"><span class="oc"></span><span>${o}</span></div>`).join('')}<div class="quiz-fb ok" id="${qid}-ok">${b.ok}</div><div class="quiz-fb no" id="${qid}-no">${b.no}</div></div>`;}case 'assessment':return`<div class="blk blk-card"><h3>✅ ${b.title}</h3>${b.items.map(x=>`<div class="assess-item"><span>${x}</span><div class="rating-g">${b.ratings.map(r=>`<button class="r-btn" onclick="selR(this)">${r}</button>`).join('')}</div></div>`).join('')}</div>`;case 'code':{const cid='c-'+Math.random().toString(36).substr(2,8);return`<div class="blk" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:18px;box-shadow:0 4px 6px rgba(0,0,0,0.05);"><div style="background:#2d2d2d;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;"><span style="color:#e0e0e0;font-size:13px;font-weight:600;font-family:monospace;">${b.lang}</span><button style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e0e0e0;border-radius:4px;padding:5px 10px;font-size:12px;cursor:pointer;" onclick="navigator.clipboard.writeText(document.getElementById('${cid}').textContent);this.textContent='복사 완료 ✔';setTimeout(()=>this.textContent='코드 복사',2000);">코드 복사</button></div><div style="background:#1e1e1e;padding:16px;overflow-x:auto;"><pre id="${cid}" style="margin:0;color:#d4d4d4;font-family:Consolas,Monaco,monospace;font-size:14px;line-height:1.6;">${b.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div></div>`;}default:return'';}}
function render(pid){const pg=D.pages.find(p=>p.id===pid);if(!pg)return;visited.add(pid);cur=pid;const idx=D.pages.indexOf(pg);const m=document.getElementById('main');m.innerHTML=`<div class="pg-hd"><div class="pg-crumb">${D.title} ${pg.cat?`> ${pg.cat}`:''}</div><h2 class="pg-title">${pg.icon} ${pg.title}</h2></div>${pg.blocks.map(b=>rBlock(b,pid)).join('')}<div class="pg-nav">${idx>0?`<button class="btn btn-o" onclick="go('${D.pages[idx-1].id}')">← 이전</button>`:'<div></div>'}${idx<D.pages.length-1?`<button class="btn btn-p" onclick="go('${D.pages[idx+1].id}')">다음 →</button>`:`<button class="btn btn-p" onclick="alert('모든 학습을 완료했습니다! 🎉')">학습 완료 🎉</button>`}</div>`;document.querySelectorAll('.nav-item').forEach(el=>{el.classList.toggle('active',el.dataset.pid===pid)});const pct=Math.round(visited.size/D.pages.length*100);document.getElementById('pTxt').textContent=pct+'%';document.getElementById('pBar').style.width=pct+'%';window.scrollTo({top:0,behavior:'smooth'});document.querySelector('.sidebar').classList.remove('open');}
function go(pid){render(pid)}
function swTab(tid,idx,btn){btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll(`[id^="${tid}-"]`).forEach(p=>p.classList.remove('active'));document.getElementById(`${tid}-${idx}`).classList.add('active');}
function chkQ(qid,sel,ans){const qz=document.getElementById(qid);qz.querySelectorAll('.quiz-opt').forEach((o,i)=>{o.classList.remove('correct','wrong');const oc=o.querySelector('.oc');if(i===sel){o.classList.add(sel===ans?'correct':'wrong');oc.textContent=sel===ans?'✓':'✗';}if(i===ans&&sel!==ans){o.classList.add('correct');oc.textContent='✓';}o.style.pointerEvents='none';});document.getElementById(sel===ans?qid+'-ok':qid+'-no').classList.add('show');}
function selR(btn){btn.parentElement.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
let navHTML='',curCat=null;D.pages.forEach(p=>{if(p.cat!==curCat){if(p.cat)navHTML+=`<div class="nav-cat">${p.cat}</div>`;curCat=p.cat;}navHTML+=`<div class="nav-item ${p.id==='p1'?'active':''}" data-pid="${p.id}" onclick="go('${p.id}')"><span class="icon">${p.icon}</span><span>${p.title}</span></div>`;});document.getElementById('nav').innerHTML=navHTML;
render('p1');
</script>
</body>
</html>
