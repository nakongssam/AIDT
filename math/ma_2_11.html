{id:"p1",cat:"도입",icon:"🎯",title:"학습목표",blocks:[
{t:"html",v:`<div class="blk" style="text-align:center;padding:20px 0"><div style="font-size:12px;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:6px">수학(또는 과학) × 정보 융합 · 지수 로그 데이터 분석</div><h2 style="font-size:28px;font-weight:900;margin-bottom:8px">유구읍 실크의 물결<br>생산량 변화 분석과 미래 예측</h2><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:15px"><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--accent-lt);color:var(--accent-dk)">수학(지수·로그·미분)</span><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--blue-lt);color:var(--blue)">정보(Python)</span><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--purple-lt);color:var(--purple)">데이터 예측</span></div></div>`},
{t:"objectives",items:["유구읍 연도별 실크 생산량 데이터를 분석하여 생산량 변화 분석 및 미래를 예측할 수 있다.","지수·로그 함수의 도함수를 구해 특정 연도의 순간 변화율을 계산하고, 이를 바탕으로 생산량의 증가·감소 속도를 해석할 수 있다.","함수 모델을 이용해 단기(3년) 예측표를 작성하고 그 수학적 근거로 현실적 정책을 제안·정리하여 시각 콘텐츠로 제작·공유·발표할 수 있다."]}
]},
{id:"p2",cat:"도입",icon:"💭",title:"생각해요",blocks:[
{t:"html",v:`<div class="blk"><h3>유구 실크 산업의 미래를 데이터로 읽다</h3><p>'유구'하면 한때 대한민국 비단 생산의 70%를 차지했던 '실크 도시'라는 별명을 떠올린다. 밤낮없이 돌아가던 직조 기계 소리와 활기 넘치던 골목은 지역의 큰 자랑이었다. 그런데 1980년대 후반을 지나며 값싼 수입 원단이 밀려오고 사람들의 생활 방식이 바뀌면서, 수많은 공장의 기계 소리는 멈추고 생산량은 급격히 줄어들었다.</p><p>그렇다면 유구 실크는 이대로 사라지게 될까? 어쩌면 유구의 비단은 단순히 옷감이 아니라, 우리의 근대 산업 역사를 보여주는 '문화유산'이나, 전통 직조 방식을 직접 체험하는 '관광 상품'으로 새롭게 태어날 수 있지 않을까?</p></div>`},
{t:"input",label:"유구 실크 산업의 변화를 제대로 이해하고 미래를 준비하기 위해 어떤 데이터가 필요하며, 그 데이터를 어떻게 분석하고 해석하면 합리적일까?",ph:"예: 연도별 생산량 데이터를 수집하고, 지수함수로 감소 추세를 모델링한 뒤, 도함수로 변화 속도를 분석한다.",rows:3}
]},
{id:"p3",cat:"알아봐요",icon:"📖",title:"1. 추세선이란?",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 추세선이란 무엇인가?</h3><p>추세선은 시간이나 다른 변수에 따른 자료의 '전반적인 경향(추세)'을 한 줄(또는 곡선)로 나타낸 것이다. 많은 점들(관측값)을 한눈에 보았을 때 "대체로 오른다/내려간다/비슷하다" 같은 큰 흐름을 보여주려고 쓴다.</p></div>`},
{t:"html",v:`<div class="blk blk-card"><h4>주로 쓰는 형태</h4><p>• <strong>선형(직선)</strong>: 일정한 양으로 증가·감소할 때</p><p>• <strong>지수형(지수함수)</strong>: 일정한 비율로(퍼센트로) 증가·감소할 때</p><p>• <strong>이동평균</strong>: 잡음을 줄이고 부드러운 흐름을 볼 때</p><h4>추세선 평가 지표</h4><p>• <strong>R²(결정계수)</strong>: 모델이 데이터 변동을 얼마나 잘 설명하는지 (1에 가까우면 좋음)</p><p>• <strong>RMSE</strong>: 예측 오차의 평균 크기 (작을수록 좋음)</p></div>`},
{t:"callout",variant:"blue",title:"⚠️ 주의할 점",body:"추세선은 미래로 연장할 때 불확실성이 커진다. R²만으로 모델을 결정하지 말고 잔차 패턴·현실성(모델이 실제 상황에 맞는지)도 살펴야 한다."}
]},
{id:"p4",cat:"알아봐요",icon:"📖",title:"2. 함수의 극한, 미분계수, 도함수",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 함수의 극한</h3><p>함수 y = f(x)의 그래프에서 x의 값이 한없이 커질 때(x → ∞) y의 값이 특정 값에 한없이 가까워지는 것을 극한이라 한다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>▶ 미분계수와 도함수</h3><p><strong>미분계수</strong>: 함수 f(x)에서 x = a에서의 순간변화율</p><p style="text-align:center;font-size:16px;font-weight:700;margin:8px 0">f'(a) = lim<sub>Δx→0</sub> [f(a+Δx) − f(a)] / Δx</p><p><strong>도함수</strong>: 정의역의 각 원소 x에 미분계수 f'(x)를 대응시키는 새로운 함수이다. 도함수 기반으로 "언제 산업 감소가 더 빨라졌는지" 해석할 수 있다.</p></div>`},
{t:"html",v:`<div class="blk blk-card"><h4>지수·로그 함수의 도함수</h4><p>• f(x) = eˣ → f'(x) = eˣ</p><p>• f(x) = ln x → f'(x) = 1/x</p></div>`},

]}

{id:"p5",cat:"알아봐요",icon:"📖",title:"참고: 추세선과 도함수의 활용",blocks:[

{id:"p11",cat:"정리",icon:"❓",title:"활동퀴즈 1. 극한과 도함수",blocks:[
{t:"quiz",num:"01",q:"다음 극한값은 얼마인가? lim(x→∞) ln(x)/x",opts:["1","0","∞","−∞","존재하지 않는다"],ans:1,ok:"정답입니다! 로피탈 정리에 의해 lim(x→∞) ln(x)/x = lim(x→∞) (1/x)/1 = 0입니다.",no:"힌트: 로피탈 정리를 적용해 봅시다."},
{t:"quiz",num:"02",q:"어떤 지역의 실크 생산량이 지수모델 y = Ae^(bt)로 증가한다고 한다. 생산량이 5년마다 2배가 된다면, 상수 b의 값(연 단위)은 대략 얼마인가?",opts:["ln 5","ln 2 / 5","5 / ln 2","ln 2","ln 5 / 2"],ans:1,ok:"정답입니다! 2 = e^(5b)에서 5b = ln 2, b = ln 2 / 5 ≈ 0.1386입니다.",no:"힌트: A·e^(5b) = 2A에서 e^(5b) = 2를 풀어봅시다."},
{t:"quiz",num:"03",q:"함수 f(x) = eˣ와 g(x) = ln x의 도함수 f'(x), g'(x) 중 옳게 짝지은 것은?",opts:["f'(x) = eˣ, g'(x) = 1/x","f'(x) = xeˣ, g'(x) = x","f'(x) = eˣ, g'(x) = x","f'(x) = 1/x, g'(x) = eˣ","f'(x) = ln x, g'(x) = eˣ"],ans:0,ok:"정답입니다! (eˣ)' = eˣ, (ln x)' = 1/x입니다.",no:"힌트: 지수함수와 로그함수의 기본 미분 공식을 떠올려 봅시다."}
]},
{id:"p12",cat:"정리",icon:"❓",title:"활동퀴즈 2. 추세선과 예측",blocks:[
{t:"quiz",num:"04",q:"로그함수 y = a·ln(x) + b가 점 (1, 0)과 (e, 3)을 지나면 a, b는?",opts:["a = 1, b = 3","a = 3, b = 0","a = 0, b = 3","a = 3, b = −3","a = e, b = 0"],ans:1,ok:"정답입니다! (1,0): b = 0, (e,3): a·ln(e) + 0 = a = 3입니다.",no:"힌트: ln(1) = 0, ln(e) = 1을 이용합시다."},
{t:"quiz",num:"05",q:"연도별 생산량 데이터에서 (2018년, 3000상자), (2022년, 3600상자) 두 점으로 단순 선형 추세선을 만들었다. 연간 기울기와 2025년의 예측 생산량은?",opts:["기울기 150, 예측 4050","기울기 120, 예측 3960","기울기 200, 예측 4200","기울기 100, 예측 3900","기울기 180, 예측 4140"],ans:0,ok:"정답입니다! 기울기 = (3600−3000)/(2022−2018) = 150. 예측: 3600 + 150×3 = 4050",no:"힌트: 기울기 = (y₂−y₁)/(x₂−x₁)로 계산합니다."},
{t:"quiz",num:"06",q:"회귀 분석에서 결정계수 R²의 의미로 가장 알맞은 것은?",opts:["R²는 모델의 기울기를 나타낸다.","R²가 1에 가까우면 모델이 데이터의 변동량을 잘 설명한다.","R²가 음수이면 반드시 모델이 틀렸음을 의미한다.","R²는 항상 0.5보다 크다.","R²가 크면 항상 예측이 정확하다는 뜻이다."],ans:1,ok:"정답입니다! R²가 1에 가까울수록 모델이 데이터를 잘 설명합니다.",no:"힌트: 결정계수는 모델의 '설명력'을 나타내는 지표입니다."},
{t:"quiz",num:"07",q:"어떤 데이터에 대해 선형모델의 R²=0.72, 지수모델의 R²=0.91이 나왔다. 이 경우 옳은 해석은?",opts:["선형모델이 지수모델보다 데이터를 더 잘 설명한다.","지수모델이 선형모델보다 데이터를 더 잘 설명한다.","R²값만으로 반드시 지수모델을 택해야 한다.","두 모델 모두 틀렸다고 볼 수 있다.","R²가 클수록 모델의 복잡성이 낮다."],ans:1,ok:"정답입니다! R² = 0.91인 지수모델이 데이터를 더 잘 설명합니다. 다만 잔차 패턴 등도 함께 확인해야 합니다.",no:"힌트: R²가 더 큰 모델이 데이터를 더 잘 설명하지만, 그것만으로 최종 결정하지는 않습니다."}
]},
{id:"p13",cat:"정리",icon:"📚",title:"읽기 자료",blocks:[
{t:"html",v:`<div class="blk"><h3>★ 유구면 실크 생산량 이야기</h3><p>유구면은 한때 국내 실크(비단) 생산의 중요한 거점이었고, 지역 경제와 문화에 큰 영향을 미쳤다. 시간이 지나면서 외부 환경(저가 수입품, 소비패턴 변화)과 내부 요인(인구 구조·기술 변화)으로 생산 양상이 바뀌었고, 현재는 '산업으로서의 생산'과 '문화·체험 자원'으로서의 가치가 동시에 논의되고 있다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 추세선 분야별 실제 활용</h3><p><strong>농업·지역산업</strong>: 연도별 생산량에 추세선을 그려 장기적 감소/회복 경향을 확인하고, 축제나 프로모션 전후의 실제 생산량과 추세선 차이를 비교해 단기 이벤트 효과를 추정한다.</p><p><strong>경제·정책</strong>: 실업률·물가·지역 생산 지표에 추세선을 적용해 정책 효과(시점·지속성)를 평가한다.</p><p><strong>비즈니스·마케팅</strong>: 제품 판매량에 추세선과 이동평균을 적용해 프로모션 시기·재고 계획을 수립한다.</p></div>`}
]},

]};
let cur='p1',visited=new Set();
function rBlock(b,pid){switch(b.t){case 'html':return b.v;case 'objectives':return`<div class="blk blk-card"><h3>🎯 학습목표</h3><ul class="obj-list">${b.items.map((x,i)=>`<li><span class="obj-num">${i+1}</span><span>${x}</span></li>`).join('')}</ul></div>`;case 'callout':return`<div class="callout ${b.variant||''}"><div class="c-title">${b.title}</div><div class="c-body">${b.body}</div></div>`;case 'input':{const id='i-'+Math.random().toString(36).substr(2,5);return`<div class="blk input-group"><label for="${id}">${b.label}</label>${b.rows>1?`<textarea id="${id}" rows="${b.rows}" placeholder="${b.ph||''}"></textarea>`:`<input type="text" id="${id}" placeholder="${b.ph||''}">`}</div>`;}case 'steps':return`<div class="steps"><div class="s-hd">📋 ${b.title}</div>${b.items.map((s,i)=>`<div class="step" onclick="this.classList.toggle('done')"><div class="s-n">${i+1}</div><div class="s-c"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`).join('')}</div>`;case 'link':return`<a class="link-card" href="${b.url}" target="_blank"><div class="l-icon">${b.icon||'🔗'}</div><div class="l-info"><h4>${b.title}</h4><p>${b.desc}</p></div></a>`;case 'cards':return`<div class="cards-grid">${b.items.map(c=>`<div class="flip-card" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="flip-front">${c.front.replace(/\n/g,'<br>')}</div><div class="flip-back">${c.back}</div></div></div>`).join('')}</div>`;case 'prediction':return`<div class="blk blk-card"><h4>🔮 예측 조건/행동 입력</h4>${b.items.map(x=>`<div class="pred-row"><label>${x.label}</label><input type="text" placeholder="${x.ph}" style="width:100%"></div>`).join('')}<button class="btn btn-p" style="margin-top:10px" onclick="alert('입력값이 저장되었습니다!')">저장하기</button></div>`;case 'quiz':{const qid='q-'+Math.random().toString(36).substr(2,8);return`<div class="blk blk-card" id="${qid}"><div class="quiz-q"><span class="qn">${b.num}.</span><span>${b.q}</span></div>${b.opts.map((o,i)=>`<div class="quiz-opt" onclick="chkQ('${qid}',${i},${b.ans})"><span class="oc"></span><span>${o}</span></div>`).join('')}<div class="quiz-fb ok" id="${qid}-ok">${b.ok}</div><div class="quiz-fb no" id="${qid}-no">${b.no}</div></div>`;}case 'assessment':return`<div class="blk blk-card"><h3>✅ ${b.title}</h3>${b.items.map(x=>`<div class="assess-item"><span>${x}</span><div class="rating-g">${b.ratings.map(r=>`<button class="r-btn" onclick="selR(this)">${r}</button>`).join('')}</div></div>`).join('')}</div>`;case 'code':{const cid='c-'+Math.random().toString(36).substr(2,8);return`<div class="blk" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:18px;"><div style="background:#2d2d2d;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;"><span style="color:#e0e0e0;font-size:13px;font-weight:600;font-family:monospace;">${b.lang}</span><button style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e0e0e0;border-radius:4px;padding:5px 10px;font-size:12px;cursor:pointer;" onclick="navigator.clipboard.writeText(document.getElementById('${cid}').textContent);this.textContent='복사 완료 ✔';setTimeout(()=>this.textContent='코드 복사',2000);">코드 복사</button></div><div style="background:#1e1e1e;padding:16px;overflow-x:auto;"><pre id="${cid}" style="margin:0;color:#d4d4d4;font-family:Consolas,Monaco,monospace;font-size:14px;line-height:1.6;">${b.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div></div>`;}default:return'';}}
function render(pid){const pg=D.pages.find(p=>p.id===pid);if(!pg)return;visited.add(pid);cur=pid;const idx=D.pages.indexOf(pg);const m=document.getElementById('main');m.innerHTML=`<div class="pg-hd"><div class="pg-crumb">${D.title} ${pg.cat?`> ${pg.cat}`:''}</div><h2 class="pg-title">${pg.icon} ${pg.title}</h2></div>${pg.blocks.map(b=>rBlock(b,pid)).join('')}<div class="pg-nav">${idx>0?`<button class="btn btn-o" onclick="go('${D.pages[idx-1].id}')">← 이전</button>`:'<div></div>'}${idx<D.pages.length-1?`<button class="btn btn-p" onclick="go('${D.pages[idx+1].id}')">다음 →</button>`:`<button class="btn btn-p" onclick="alert('모든 학습을 완료했습니다! 🎉')">학습 완료 🎉</button>`}</div>`;document.querySelectorAll('.nav-item').forEach(el=>{el.classList.toggle('active',el.dataset.pid===pid)});const pct=Math.round(visited.size/D.pages.length*100);document.getElementById('pTxt').textContent=pct+'%';document.getElementById('pBar').style.width=pct+'%';window.scrollTo({top:0,behavior:'smooth'});document.querySelector('.sidebar').classList.remove('open');}
function go(pid){render(pid)}
function swTab(tid,idx,btn){btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll(`[id^="${tid}-"]`).forEach(p=>p.classList.remove('active'));document.getElementById(`${tid}-${idx}`).classList.add('active');}
function chkQ(qid,sel,ans){const qz=document.getElementById(qid);qz.querySelectorAll('.quiz-opt').forEach((o,i)=>{o.classList.remove('correct','wrong');const oc=o.querySelector('.oc');if(i===sel){o.classList.add(sel===ans?'correct':'wrong');oc.textContent=sel===ans?'✓':'✗';}if(i===ans&&sel!==ans){o.classList.add('correct');oc.textContent='✓';}o.style.pointerEvents='none';});document.getElementById(sel===ans?qid+'-ok':qid+'-no').classList.add('show');}
function selR(btn){btn.parentElement.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
let navHTML='',curCat=null;D.pages.forEach(p=>{if(p.cat!==curCat){if(p.cat)navHTML+=`<div class="nav-cat">${p.cat}</div>`;curCat=p.cat;}navHTML+=`<div class="nav-item ${p.id==='p1'?'active':''}" data-pid="${p.id}" onclick="go('${p.id}')"><span class="icon">${p.icon}</span><span>${p.title}</span></div>`;});document.getElementById('nav').innerHTML=navHTML;
render('p1');
</script>
</body>
</html>
