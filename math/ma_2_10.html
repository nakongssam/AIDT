{front:"Google Colab",back:"Python 코드로 무령왕릉 부피 계산 자동화. 알고리즘 구현 및 자동 계산 실행"},
{front:"Tinkercad",back:"온라인 3D 모델링 도구. 무령왕릉 내부 구조를 직접 모델링하여 계산 결과와 비교"},

{t:"quiz",num:"02",q:"원기둥의 부피를 구할 때 필요하지 않은 정보는?",opts:["밑면의 반지름","원주율 π","높이","모서리의 개수","밑면의 넓이"],ans:3,ok:"정답입니다! 모서리의 개수는 원기둥 부피 계산에 필요하지 않습니다.",no:"힌트: 원기둥의 부피 = πr²h에서 필요한 것은?"},
{t:"quiz",num:"03",q:"무령왕릉 석실을 직육면체로 단순화하여 길이 4m, 폭 3m, 높이 2.5m라면 그 부피는?",opts:["24m³","25m³","28m³","29.5m³","30m³"],ans:4,ok:"정답입니다! 4 × 3 × 2.5 = 30m³입니다.",no:"힌트: 가로 × 세로 × 높이를 계산하세요."},
{t:"quiz",num:"04",q:"입체도형의 부피 계산이 중요한 이유로 가장 적절한 것은?",opts:["도형의 색깔을 알 수 있다.","공간이 차지하는 크기를 수치로 확인할 수 있다.","도형의 둘레를 구할 수 있다.","도형의 무게를 알 수 있다.","직선을 측정할 수 있다."],ans:1,ok:"정답입니다! 부피 계산은 공간의 크기를 수치로 확인하는 데 핵심적입니다.",no:"힌트: '부피'는 무엇의 크기를 나타내나요?"}
]},
{id:"p11",cat:"정리",icon:"❓",title:"활동퀴즈 2. 적분을 통한 부피",blocks:[
{t:"quiz",num:"05",q:"곡선 y = x²와 x축, x=0 및 x=2로 둘러싸인 영역을 x축 회전시킨 입체의 부피는?",opts:["(16/5)π","(32/5)π","(8/3)π","4π","8π"],ans:1,ok:"정답입니다! V = π∫₀² (x²)² dx = π∫₀² x⁴ dx = π[x⁵/5]₀² = (32/5)π입니다.",no:"힌트: 회전체 부피 공식 V = π∫[f(x)]²dx를 적용하세요."},
{t:"quiz",num:"06",q:"무령왕릉의 아치형 천장을 반원으로 가정했을 때, 반지름이 2m이고 길이가 5m인 반원통 구조의 부피는?",opts:["4πm³","10πm³","20πm³","5πm³","8πm³"],ans:1,ok:"정답입니다! 반원통의 부피 = (1/2)πr²L = (1/2)π(4)(5) = 10π m³입니다.",no:"힌트: 반원통은 원기둥의 절반입니다. V = (1/2)πr²L"},
{t:"quiz",num:"07",q:"적분을 활용해 부피를 구하는 이유로 가장 적절한 것은?",opts:["계산이 단순해져서 공식을 외울 필요가 없다.","직선 구조만 계산할 수 있다.","복잡한 곡선 구조도 정밀하게 계산할 수 있다.","모든 도형을 직육면체로 바꿀 수 있다.","부피 대신 넓이를 구할 수 있다."],ans:2,ok:"정답입니다! 적분은 곡선 구조의 부피도 정밀하게 계산할 수 있습니다.",no:"힌트: 아치형 천장처럼 곡선이 있는 구조를 생각해 보세요."}
]},
{id:"p12",cat:"정리",icon:"📚",title:"읽기 자료",blocks:[
{t:"html",v:`<div class="blk"><h3>★ 무령왕릉의 구조와 특징</h3><p>무령왕릉은 백제 25대 왕인 무령왕과 왕비의 합장릉으로, 지하 석실 구조를 가지고 있다. 내부는 직사각형 석실에 반원형 아치 천장이 얹힌 형태이며, 입구에는 좁은 연도가 연결되어 있다. 이러한 구조는 단순한 직육면체와 곡선 구조의 결합으로 볼 수 있어 수학적 계산에 적합하다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 디지털 도구를 활용한 모델링</h3><p>GeoGebra와 Tinkercad 같은 디지털 도구를 이용하면 복잡한 구조를 3차원 모델로 재현할 수 있다. GeoGebra는 수학적 그래프와 입체 시각화를 지원하고, Tinkercad는 간단한 블록식 3D 모델링이 가능하며, Google Colab은 Python 코드로 부피 계산을 자동화할 수 있다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 건축물 부피 계산의 실제 활용</h3><p>부피 계산은 단순한 수학 학습을 넘어 건축·공학 분야에서 매우 중요한 역할을 한다. 건축물 내부 공간 설계, 냉·난방 효율 계산, 재료의 사용량 추정 등에 활용된다. 무령왕릉의 사례를 통해 수학이 실생활과 역사적 건축물 연구에 어떻게 적용되는지 이해할 수 있다.</p></div>`}
]},

let cur='p1',visited=new Set();
function rBlock(b,pid){switch(b.t){case 'html':return b.v;case 'objectives':return`<div class="blk blk-card"><h3>🎯 학습목표</h3><ul class="obj-list">${b.items.map((x,i)=>`<li><span class="obj-num">${i+1}</span><span>${x}</span></li>`).join('')}</ul></div>`;case 'callout':return`<div class="callout ${b.variant||''}"><div class="c-title">${b.title}</div><div class="c-body">${b.body}</div></div>`;case 'input':{const id='i-'+Math.random().toString(36).substr(2,5);return`<div class="blk input-group"><label for="${id}">${b.label}</label>${b.rows>1?`<textarea id="${id}" rows="${b.rows}" placeholder="${b.ph||''}"></textarea>`:`<input type="text" id="${id}" placeholder="${b.ph||''}">`}</div>`;}case 'steps':return`<div class="steps"><div class="s-hd">📋 ${b.title}</div>${b.items.map((s,i)=>`<div class="step" onclick="this.classList.toggle('done')"><div class="s-n">${i+1}</div><div class="s-c"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`).join('')}</div>`;case 'link':return`<a class="link-card" href="${b.url}" target="_blank"><div class="l-icon">${b.icon||'🔗'}</div><div class="l-info"><h4>${b.title}</h4><p>${b.desc}</p></div></a>`;case 'cards':return`<div class="cards-grid">${b.items.map(c=>`<div class="flip-card" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="flip-front">${c.front.replace(/\n/g,'<br>')}</div><div class="flip-back">${c.back}</div></div></div>`).join('')}</div>`;case 'prediction':return`<div class="blk blk-card"><h4>🔮 예측 조건/행동 입력</h4>${b.items.map(x=>`<div class="pred-row"><label>${x.label}</label><input type="text" placeholder="${x.ph}" style="width:100%"></div>`).join('')}<button class="btn btn-p" style="margin-top:10px" onclick="alert('입력값이 저장되었습니다!')">저장하기</button></div>`;case 'quiz':{const qid='q-'+Math.random().toString(36).substr(2,8);return`<div class="blk blk-card" id="${qid}"><div class="quiz-q"><span class="qn">${b.num}.</span><span>${b.q}</span></div>${b.opts.map((o,i)=>`<div class="quiz-opt" onclick="chkQ('${qid}',${i},${b.ans})"><span class="oc"></span><span>${o}</span></div>`).join('')}<div class="quiz-fb ok" id="${qid}-ok">${b.ok}</div><div class="quiz-fb no" id="${qid}-no">${b.no}</div></div>`;}case 'assessment':return`<div class="blk blk-card"><h3>✅ ${b.title}</h3>${b.items.map(x=>`<div class="assess-item"><span>${x}</span><div class="rating-g">${b.ratings.map(r=>`<button class="r-btn" onclick="selR(this)">${r}</button>`).join('')}</div></div>`).join('')}</div>`;case 'code':{const cid='c-'+Math.random().toString(36).substr(2,8);return`<div class="blk" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:18px;box-shadow:0 4px 6px rgba(0,0,0,0.05);"><div style="background:#2d2d2d;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;"><span style="color:#e0e0e0;font-size:13px;font-weight:600;font-family:monospace;">${b.lang}</span><button style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e0e0e0;border-radius:4px;padding:5px 10px;font-size:12px;cursor:pointer;" onclick="navigator.clipboard.writeText(document.getElementById('${cid}').textContent);this.textContent='복사 완료 ✔';setTimeout(()=>this.textContent='코드 복사',2000);">코드 복사</button></div><div style="background:#1e1e1e;padding:16px;overflow-x:auto;"><pre id="${cid}" style="margin:0;color:#d4d4d4;font-family:Consolas,Monaco,monospace;font-size:14px;line-height:1.6;">${b.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div></div>`;}default:return'';}}
function render(pid){const pg=D.pages.find(p=>p.id===pid);if(!pg)return;visited.add(pid);cur=pid;const idx=D.pages.indexOf(pg);const m=document.getElementById('main');m.innerHTML=`<div class="pg-hd"><div class="pg-crumb">${D.title} ${pg.cat?`> ${pg.cat}`:''}</div><h2 class="pg-title">${pg.icon} ${pg.title}</h2></div>${pg.blocks.map(b=>rBlock(b,pid)).join('')}<div class="pg-nav">${idx>0?`<button class="btn btn-o" onclick="go('${D.pages[idx-1].id}')">← 이전</button>`:'<div></div>'}${idx<D.pages.length-1?`<button class="btn btn-p" onclick="go('${D.pages[idx+1].id}')">다음 →</button>`:`<button class="btn btn-p" onclick="alert('모든 학습을 완료했습니다! 🎉')">학습 완료 🎉</button>`}</div>`;document.querySelectorAll('.nav-item').forEach(el=>{el.classList.toggle('active',el.dataset.pid===pid)});const pct=Math.round(visited.size/D.pages.length*100);document.getElementById('pTxt').textContent=pct+'%';document.getElementById('pBar').style.width=pct+'%';window.scrollTo({top:0,behavior:'smooth'});document.querySelector('.sidebar').classList.remove('open');}
function go(pid){render(pid)}
function swTab(tid,idx,btn){btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll(`[id^="${tid}-"]`).forEach(p=>p.classList.remove('active'));document.getElementById(`${tid}-${idx}`).classList.add('active');}
function chkQ(qid,sel,ans){const qz=document.getElementById(qid);qz.querySelectorAll('.quiz-opt').forEach((o,i)=>{o.classList.remove('correct','wrong');const oc=o.querySelector('.oc');if(i===sel){o.classList.add(sel===ans?'correct':'wrong');oc.textContent=sel===ans?'✓':'✗';}if(i===ans&&sel!==ans){o.classList.add('correct');oc.textContent='✓';}o.style.pointerEvents='none';});document.getElementById(sel===ans?qid+'-ok':qid+'-no').classList.add('show');}
function selR(btn){btn.parentElement.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
let navHTML='',curCat=null;D.pages.forEach(p=>{if(p.cat!==curCat){if(p.cat)navHTML+=`<div class="nav-cat">${p.cat}</div>`;curCat=p.cat;}navHTML+=`<div class="nav-item ${p.id==='p1'?'active':''}" data-pid="${p.id}" onclick="go('${p.id}')"><span class="icon">${p.icon}</span><span>${p.title}</span></div>`;});document.getElementById('nav').innerHTML=navHTML;
render('p1');
</script>
</body>
