const D={title:"정적분으로 공주시 하천 곡선 넓이 구하기",pages:[
{id:"p1",cat:"도입",icon:"🎯",title:"학습목표",blocks:[
{t:"html",v:`<div class="blk" style="text-align:center;padding:20px 0"><div style="font-size:12px;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:6px">수학 × 정보 융합 · 하천 곡선 넓이 계산</div><h2 style="font-size:28px;font-weight:900;margin-bottom:8px">정적분으로 공주시 하천<br>곡선 넓이 구하기</h2><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:15px"><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--accent-lt);color:var(--accent-dk)">수학(정적분)</span><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--blue-lt);color:var(--blue)">정보(함수근사)</span><span style="padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;background:var(--purple-lt);color:var(--purple)">AI 시각화</span></div></div>`},
{t:"objectives",items:["정적분을 이용해 하천 곡선이 둘러싼 넓이를 계산할 수 있다.","공주시 하천 곡선의 실제 형태를 AI 도구를 활용해 함수로 모델링할 수 있다.","수학적 사고와 디지털 도구를 접목하여 실생활 문제 해결 능력을 기를 수 있다."]}
]},
{id:"p2",cat:"도입",icon:"💭",title:"생각해요",blocks:[
{t:"html",v:`<div class="blk"><h3>금강의 흐름을 수학적으로 탐구한다면?</h3><p>공주는 금강이 흐르는 도시이다. 금강은 공주의 중심을 휘돌아 흐르며 도시와 역사를 이어주는 상징적인 하천이다. 이렇게 굽이진 하천 곡선을 수학적으로 바라본다면 어떤 의미가 있을까? 정적분을 활용하면, 금강의 곡선을 함수로 근사하고 그 둘레로 만들어지는 넓이를 실제로 계산할 수 있다.</p></div>`},
{t:"input",label:"굽이치는 금강의 곡선을 수학적으로 표현하려면 어떤 방식으로 함수로 바꿀 수 있을까?",ph:"예: 하천의 위쪽·아래쪽 경계를 각각 함수로 표현하고, 좌표 데이터를 이용해 다항식으로 근사한다.",rows:3},
{t:"input",label:"두 곡선 사이에 담긴 공간을 정적분으로 계산하면, 그 결과는 우리에게 어떤 의미를 줄까?",ph:"예: 실제 하천의 넓이를 수치적으로 알 수 있어 홍수 예측이나 도시 계획에 활용할 수 있다.",rows:3}
]},
{id:"p3",cat:"알아봐요",icon:"📖",title:"1. 두 곡선 사이의 넓이",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 두 곡선 사이의 넓이</h3><p>정적분은 함수와 축 사이의 넓이를 구할 때 활용되며, 나아가 두 곡선 사이의 넓이도 계산할 수 있다.</p><p>두 함수 f(x), g(x)가 닫힌구간 [a, b]에서 연속일 때, 두 곡선 y = f(x), y = g(x) 및 두 직선 x = a, x = b로 둘러싸인 도형의 넓이 S는</p><p style="text-align:center;font-size:16px;font-weight:700;margin:12px 0">S = ∫<sub>a</sub><sup>b</sup> |f(x) − g(x)| dx</p><p>이 활동에서는 하천의 위쪽 경계 함수와 아래쪽 경계 함수, 하천을 나타내는 시작점과 끝점을 바탕으로 하천의 넓이를 추정할 수 있다.</p></div>`},
{t:"callout",variant:"blue",title:"▷ 활용 포인트",body:"① 하천의 공간적 크기를 수학적으로 해석할 수 있음<br>② 실제 지리·환경 연구에 활용할 수 있는 수학적 접근 제공"}
]},
{id:"p4",cat:"알아봐요",icon:"📖",title:"2. 곡선의 함수 표현과 도구 소개",blocks:[
{t:"html",v:`<div class="blk"><h3>▶ 곡선의 함수 표현이란?</h3><p>실제 하천의 경계는 불규칙하므로 그대로는 수식화가 어렵다. 이때 좌표 데이터를 이용해 곡선을 다항식이나 구간별 선형 함수로 표현하는 과정을 <strong>함수 근사(Function Approximation)</strong>라 한다.</p><p style="text-align:center;font-size:16px;font-weight:700;margin:12px 0">예: f(x) ≈ a₀ + a₁x + a₂x² + ⋯ + aₙxⁿ</p></div>`},
{t:"callout",variant:"purple",title:"▷ 활용 포인트",body:"① 하천 곡선을 코딩과 AI 기법으로 함수식으로 변환하며 데이터 처리 능력 함양<br>② 근사한 함수식을 정적분하여 수학적 계산과 프로그래밍을 연결<br>③ 수학·AI 융합 탐구를 통해 문제 해결력과 디지털 리터러시를 동시에 신장"},
{t:"cards",items:[
{front:"ChatGPT",back:"공주시 지도에서 하천 경계의 함수를 근사하는 코드 생성, 탐구 방향 설정 및 아이디어 탐색에 활용"},
{front:"Google Colab",back:"Python으로 하천 함수 표현 및 정적분 계산 실행. 수학과 정보 융합 수업에서 텍스트 코딩을 통한 탐구"},
{front:"알지오매스",back:"두 함수의 그래프를 직접 입력하고, 정적분으로 넓이를 계산하는 과정을 시각적으로 확인"},
{front:"울프람알파",back:"복잡한 정적분 계산을 자동으로 수행. 하천 함수가 복잡한 경우 공학 계산 도구로 적극 활용"},
{front:"구글 어스",back:"실제 하천의 넓이를 측정하여 AI·알지오매스로 표현한 함수의 정적분 결과값과 비교"}
]},
{t:"link",url:"https://www.algeomath.kr/",icon:"📐",title:"알지오매스 공식 사이트",desc:"함수 그래프를 시각화하고 정적분 계산 과정을 확인할 수 있습니다"},
{t:"link",url:"https://www.wolframalpha.com/",icon:"🔢",title:"울프람알파",desc:"복잡한 정적분 계산을 자동으로 수행합니다"}

{id:"p10",cat:"정리",icon:"❓",title:"활동퀴즈 1. 두 곡선 사이의 넓이",blocks:[
{t:"quiz",num:"01",q:"함수 f(x) = x² 와 x축, x = 0, x = 3으로 둘러싸인 도형의 넓이는?",opts:["3","6","9","12","15"],ans:2,ok:"정답입니다! ∫₀³ x² dx = [x³/3]₀³ = 9입니다.",no:"힌트: ∫₀³ x² dx를 계산해 봅시다."},
{t:"quiz",num:"02",q:"금강의 한 구간을 f(x) = x², g(x) = x로 근사했을 때, [0, 1] 구간의 넓이는?",opts:["1/2","1/3","1/6","1/4","1"],ans:2,ok:"정답입니다! ∫₀¹ |x - x²| dx = [x²/2 - x³/3]₀¹ = 1/2 - 1/3 = 1/6입니다.",no:"힌트: ∫₀¹ (x - x²) dx를 계산해 봅시다."},
{t:"quiz",num:"03",q:"두 곡선 사이의 넓이를 정적분으로 구하는 이유로 가장 알맞은 것은?",opts:["곡선의 색깔을 알 수 있다.","두 함수의 최고차항을 알 수 있다.","두 함수가 만드는 영역의 실제 크기를 수치로 확인할 수 있다.","곡선의 길이를 알 수 있다.","함수의 교점을 구할 수 있다."],ans:2,ok:"정답입니다! 정적분은 두 곡선이 둘러싼 영역의 실제 넓이를 수치로 계산합니다.",no:"힌트: 정적분은 '넓이'를 구하는 도구입니다."},
{t:"quiz",num:"04",q:"두 곡선 사이 넓이를 정적분으로 구할 때 옳은 조건은?",opts:["위쪽 곡선이 항상 직선이어야 한다.","아래쪽 곡선이 항상 원이어야 한다.","위쪽 곡선이 아래쪽 곡선보다 크거나 같아야 한다.","두 함수 모두 1차식이어야 한다.","넓이가 0이 되어야 한다."],ans:2,ok:"정답입니다! f(x) ≥ g(x)인 구간에서 ∫[f(x) - g(x)]dx로 넓이를 구합니다.",no:"힌트: 절댓값을 사용하는 이유를 생각해 봅시다."}
]},
{id:"p11",cat:"정리",icon:"❓",title:"활동퀴즈 2. 함수 근사와 오차",blocks:[
{t:"quiz",num:"05",q:"두 함수 f(x) = x³, g(x) = x에 대하여 [0, 1] 구간에서 두 곡선 사이의 넓이를 나타내는 정적분 식으로 옳은 것은?",opts:["∫₀¹ (x³ + x) dx","∫₀¹ (x³ − x) dx","∫₀¹ (x − x³) dx","∫₀¹ x³ dx","∫₀¹ x dx"],ans:2,ok:"정답입니다! [0,1]에서 x ≥ x³이므로 ∫₀¹ (x − x³) dx가 맞습니다.",no:"힌트: [0,1] 구간에서 x와 x³ 중 어느 것이 더 큰지 비교해 봅시다."},
{t:"quiz",num:"06",q:"함수 근사를 통해 구한 구간의 넓이가 A이고 실제 지도 면적은 B일 때, 오차율은?",opts:["A + B","(A − B) / B × 100(%)","A × B","A / B","B − A"],ans:1,ok:"정답입니다! 오차율 = (근사값 − 실제값) / 실제값 × 100%입니다.",no:"힌트: 오차율은 (차이 / 실제값) × 100%로 구합니다."},
{t:"quiz",num:"07",q:"정적분으로 계산한 넓이와 실제 면적 값이 다르게 나오는 이유로 가장 적절한 것은?",opts:["수학 공식이 잘못되었기 때문에","계산기가 오류를 내기 때문에","실제 곡선을 근사 함수로 표현했기 때문에","x축과 y축이 잘못 설정되었기 때문에","정적분이 면적 계산에 쓰이지 않기 때문에"],ans:2,ok:"정답입니다! 불규칙한 실제 곡선을 수학 함수로 근사했기 때문에 오차가 발생합니다.",no:"힌트: '근사'라는 단어의 의미를 생각해 봅시다."}
]},
{id:"p12",cat:"정리",icon:"📚",title:"읽기 자료",blocks:[
{t:"html",v:`<div class="blk"><h3>★ 금강의 곡선과 특징</h3><p>공주는 금강이 도심을 가로지르는 도시로, 강은 부드럽게 굽이치며 도시의 풍경을 만들어낸다. 이러한 곡선 형태는 단순히 자연 경관이 아니라 수학적으로 탐구할 수 있는 흥미로운 주제다. 강의 흐름을 함수로 나타내면, 실제 하천의 넓이를 정적분으로 계산할 수 있다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 디지털 도구를 활용한 학습</h3><p>AI와 코딩, 그리고 다양한 디지털 도구를 활용하면 복잡한 계산과 모델링을 쉽게 수행할 수 있다. ChatGPT는 함수 근사 방법을 설명받고 코드를 생성하는 데, 알지오매스는 두 함수의 그래프를 시각적으로 확인하는 데, 울프람알파는 복잡한 정적분 계산을 자동으로 수행하는 데 활용된다. 이 세 가지 도구를 병행하면, 개념 이해–시각화–계산 검증의 전 과정을 경험할 수 있다.</p></div>`},
{t:"html",v:`<div class="blk"><h3>★ 면적 계산의 실제 활용</h3><p>하천 면적 계산은 단순한 수학 학습을 넘어 다양한 분야에서 쓰인다. 환경 관리(하천 범람 가능 구역, 습지 보존 구역 산정), 도시 설계(교량 위치 선정, 하천변 공원 조성), 기후 연구(홍수 예측, 수자원 관리) 등에 활용된다. 금강의 사례를 통해 정적분과 함수 근사가 실질적인 도구임을 이해할 수 있다.</p></div>`}
]},
{id:"p13",cat:"정리",icon:"🧭",title:"진로 연계",blocks:[
{t:"html",v:`<div class="blk"><h3>📖 책 소개</h3><p><strong>《수학의 쓸모》</strong>(저자: 김민형) — 도시 구조, 경제, 인간 이동, 사회 시스템 등 현실 세계의 다양한 문제를 수학적으로 해석하며, 수학이 공간과 사회를 이해하는 도구가 될 수 있음을 보여주는 책</p></div>`},

{t:"html",v:`<div class="blk"><h3>🎓 대학 전공 소개</h3><p><strong>수리환경학과</strong> — 수학·통계·정적분을 기반으로 수자원 및 환경 문제를 해결하는 전공</p><p><strong>컴퓨터공학과</strong> — 알고리즘·AI·데이터 과학을 활용해 환경 데이터 처리 및 시뮬레이션 연구 수행</p><p><strong>지리학과</strong> — GIS·원격탐사·환경 지리학을 바탕으로 하천, 토지, 기후 변화 연구</p></div>`},

let cur='p1',visited=new Set();
function rBlock(b,pid){switch(b.t){case 'html':return b.v;case 'objectives':return`<div class="blk blk-card"><h3>🎯 학습목표</h3><ul class="obj-list">${b.items.map((x,i)=>`<li><span class="obj-num">${i+1}</span><span>${x}</span></li>`).join('')}</ul></div>`;case 'callout':return`<div class="callout ${b.variant||''}"><div class="c-title">${b.title}</div><div class="c-body">${b.body}</div></div>`;case 'input':{const id='i-'+Math.random().toString(36).substr(2,5);return`<div class="blk input-group"><label for="${id}">${b.label}</label>${b.rows>1?`<textarea id="${id}" rows="${b.rows}" placeholder="${b.ph||''}"></textarea>`:`<input type="text" id="${id}" placeholder="${b.ph||''}">`}</div>`;}case 'steps':return`<div class="steps"><div class="s-hd">📋 ${b.title}</div>${b.items.map((s,i)=>`<div class="step" onclick="this.classList.toggle('done')"><div class="s-n">${i+1}</div><div class="s-c"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`).join('')}</div>`;case 'link':return`<a class="link-card" href="${b.url}" target="_blank"><div class="l-icon">${b.icon||'🔗'}</div><div class="l-info"><h4>${b.title}</h4><p>${b.desc}</p></div></a>`;case 'tabs':{const tid='t-'+Math.random().toString(36).substr(2,5);return`<div class="blk"><div class="tabs-nav">${b.tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" onclick="swTab('${tid}',${i},this)">${t.label}</button>`).join('')}</div>${b.tabs.map((t,i)=>`<div class="tab-panel ${i===0?'active':''}" id="${tid}-${i}">${t.content}</div>`).join('')}</div>`;}case 'cards':return`<div class="cards-grid">${b.items.map(c=>`<div class="flip-card" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="flip-front">${c.front.replace(/\n/g,'<br>')}</div><div class="flip-back">${c.back}</div></div></div>`).join('')}</div>`;case 'prediction':return`<div class="blk blk-card"><h4>🔮 예측 조건/행동 입력</h4>${b.items.map(x=>`<div class="pred-row"><label>${x.label}</label><input type="text" placeholder="${x.ph}" style="width:100%"></div>`).join('')}<button class="btn btn-p" style="margin-top:10px" onclick="alert('입력값이 저장되었습니다!')">저장하기</button></div>`;case 'quiz':{const qid='q-'+Math.random().toString(36).substr(2,8);return`<div class="blk blk-card" id="${qid}"><div class="quiz-q"><span class="qn">${b.num}.</span><span>${b.q}</span></div>${b.opts.map((o,i)=>`<div class="quiz-opt" onclick="chkQ('${qid}',${i},${b.ans})"><span class="oc"></span><span>${o}</span></div>`).join('')}<div class="quiz-fb ok" id="${qid}-ok">${b.ok}</div><div class="quiz-fb no" id="${qid}-no">${b.no}</div></div>`;}case 'assessment':return`<div class="blk blk-card"><h3>✅ ${b.title}</h3>${b.items.map(x=>`<div class="assess-item"><span>${x}</span><div class="rating-g">${b.ratings.map(r=>`<button class="r-btn" onclick="selR(this)">${r}</button>`).join('')}</div></div>`).join('')}</div>`;case 'code':{const cid='c-'+Math.random().toString(36).substr(2,8);return`<div class="blk" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:18px;box-shadow:0 4px 6px rgba(0,0,0,0.05);"><div style="background:#2d2d2d;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;"><span style="color:#e0e0e0;font-size:13px;font-weight:600;font-family:monospace;">${b.lang}</span><button style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e0e0e0;border-radius:4px;padding:5px 10px;font-size:12px;cursor:pointer;" onclick="navigator.clipboard.writeText(document.getElementById('${cid}').textContent);this.textContent='복사 완료 ✔';setTimeout(()=>this.textContent='코드 복사',2000);">코드 복사</button></div><div style="background:#1e1e1e;padding:16px;overflow-x:auto;"><pre id="${cid}" style="margin:0;color:#d4d4d4;font-family:Consolas,Monaco,monospace;font-size:14px;line-height:1.6;">${b.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div></div>`;}default:return'';}}
function render(pid){const pg=D.pages.find(p=>p.id===pid);if(!pg)return;visited.add(pid);cur=pid;const idx=D.pages.indexOf(pg);const m=document.getElementById('main');m.innerHTML=`<div class="pg-hd"><div class="pg-crumb">${D.title} ${pg.cat?`> ${pg.cat}`:''}</div><h2 class="pg-title">${pg.icon} ${pg.title}</h2></div>${pg.blocks.map(b=>rBlock(b,pid)).join('')}<div class="pg-nav">${idx>0?`<button class="btn btn-o" onclick="go('${D.pages[idx-1].id}')">← 이전</button>`:'<div></div>'}${idx<D.pages.length-1?`<button class="btn btn-p" onclick="go('${D.pages[idx+1].id}')">다음 →</button>`:`<button class="btn btn-p" onclick="alert('모든 학습을 완료했습니다! 🎉')">학습 완료 🎉</button>`}</div>`;document.querySelectorAll('.nav-item').forEach(el=>{el.classList.toggle('active',el.dataset.pid===pid)});const pct=Math.round(visited.size/D.pages.length*100);document.getElementById('pTxt').textContent=pct+'%';document.getElementById('pBar').style.width=pct+'%';window.scrollTo({top:0,behavior:'smooth'});document.querySelector('.sidebar').classList.remove('open');}
function go(pid){render(pid)}
function swTab(tid,idx,btn){btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll(`[id^="${tid}-"]`).forEach(p=>p.classList.remove('active'));document.getElementById(`${tid}-${idx}`).classList.add('active');}
function chkQ(qid,sel,ans){const qz=document.getElementById(qid);qz.querySelectorAll('.quiz-opt').forEach((o,i)=>{o.classList.remove('correct','wrong');const oc=o.querySelector('.oc');if(i===sel){o.classList.add(sel===ans?'correct':'wrong');oc.textContent=sel===ans?'✓':'✗';}if(i===ans&&sel!==ans){o.classList.add('correct');oc.textContent='✓';}o.style.pointerEvents='none';});document.getElementById(sel===ans?qid+'-ok':qid+'-no').classList.add('show');}
function selR(btn){btn.parentElement.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
let navHTML='',curCat=null;D.pages.forEach(p=>{if(p.cat!==curCat){if(p.cat)navHTML+=`<div class="nav-cat">${p.cat}</div>`;curCat=p.cat;}navHTML+=`<div class="nav-item ${p.id==='p1'?'active':''}" data-pid="${p.id}" onclick="go('${p.id}')"><span class="icon">${p.icon}</span><span>${p.title}</span></div>`;});document.getElementById('nav').innerHTML=navHTML;
render('p1');
</script>
</body>
</html>
